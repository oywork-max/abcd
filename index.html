<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>컬러 뽑기</title>

<style>

body{
    margin:0;
    padding:20px;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#f5f5f5;
}

.container{
    max-width:500px;
    margin:auto;
}

h1{
    text-align:center;
}

.card{
    background:white;
    padding:15px;
    border-radius:16px;
    margin-bottom:12px;
}

.row{
    display:flex;
    align-items:center;
    gap:10px;
}

.name{
    width:30px;
    font-weight:bold;
}

select{
    flex:1;
    height:45px;
    border-radius:10px;
    border:1px solid #ddd;
    padding:0 10px;
}

button{
    width:100%;
    height:50px;
    border:none;
    border-radius:14px;
    font-size:18px;
    font-weight:bold;
    margin-top:10px;
}

.start{
    background:#4CAF50;
    color:white;
}

.people-btn{
    background:#2196F3;
    color:white;
}

.result{
    margin-top:15px;
    font-size:18px;
    line-height:2;
}

.people-control{
    display:flex;
    gap:10px;
}

.people-control button{
    margin-top:0;
}

</style>
</head>

<body>

<div class="container">

<h1>🎲 컬러 뽑기</h1>

<div class="card">

<div class="people-control">

<button onclick="changePeople(-1)" class="people-btn">➖ 인원 감소</button>

<button onclick="changePeople(1)" class="people-btn">➕ 인원 증가</button>

</div>

<p>현재 인원 : <span id="count">4</span>명</p>

</div>

<div id="players"></div>

<button class="start" onclick="drawColors()">시작하기</button>

<div class="card result" id="result"></div>

</div>

<script>

let people = 4;

const letters = ['A','B','C','D','E','F','G','H'];

const colorOptions = [
'🔴 빨강',
'🟡 노랑',
'🟢 초록',
'🔵 파랑',
'🟣 보라',
'🟠 주황',
'⚫ 검정',
'⚪ 흰색'
];

function renderPlayers(){

const area=document.getElementById('players');

area.innerHTML='';

for(let i=0;i<people;i++){

area.innerHTML+=`

<div class="card">

<div class="row">

<div class="name">${letters[i]}</div>

<select id="player${i}">

${colorOptions.map(color=>`
<option value="${color}">
${color}
</option>
`).join('')}

</select>

</div>

</div>

`;

}

document.getElementById('count').innerText=people;

}

function changePeople(num){

people+=num;

if(people<2) people=2;

if(people>8) people=8;

renderPlayers();

}

function shuffle(array){

for(let i=array.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[array[i],array[j]]=[array[j],array[i]];

}

return array;

}

function drawColors(){

let selected=[];

for(let i=0;i<people;i++){

selected.push(document.getElementById(`player${i}`).value);

}

let shuffled=shuffle([...selected]);

let html='';

for(let i=0;i<people;i++){

html+=`${letters[i]} 👉 ${shuffled[i]}<br>`;

}

document.getElementById('result').innerHTML=html;

}

renderPlayers();

</script>

</body>
</html>
