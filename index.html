<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>컬러 뽑기</title>

<style>

body{
margin:0;
padding:20px;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f5f5f5;
max-width:500px;
margin:auto;
}

h1{
text-align:center;
}

.people{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
margin:25px 0;
font-size:22px;
font-weight:bold;
}

.people button{
width:45px;
height:45px;
border:none;
border-radius:12px;
font-size:22px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:25px;
}

.color-btn{
height:55px;
border:none;
border-radius:14px;
font-weight:bold;
font-size:16px;
}

.selected{
outline:4px solid black;
}

.draw-btn{
width:100%;
height:55px;
border:none;
border-radius:16px;
font-size:20px;
font-weight:bold;
background:#222;
color:white;
}

.result{
margin-top:25px;
background:white;
padding:20px;
border-radius:16px;
font-size:20px;
line-height:2;
}

</style>

</head>

<body>

<h1>🎲 컬러 뽑기</h1>

<div class="people">

<button onclick="changePeople(-1)">－</button>

<span id="peopleCount">4</span>명

<button onclick="changePeople(1)">＋</button>

</div>

<div class="grid" id="grid"></div>

<button class="draw-btn" onclick="drawResult()">

뽑기

</button>

<div id="result" class="result"></div>

<script>

let people=4;

const alphabet='ABCDEFGHIJKL'.split('');

const colors=[

{n:'빨강',c:'#ff4d4d'},
{n:'노랑',c:'#ffd600'},
{n:'파랑',c:'#2196f3'},
{n:'초록',c:'#4caf50'},

{n:'보라',c:'#9c27b0'},
{n:'주황',c:'#ff9800'},
{n:'핑크',c:'#ff5fa2'},
{n:'하늘',c:'#4fc3f7'},

{n:'갈색',c:'#8d6e63'},
{n:'회색',c:'#9e9e9e'},
{n:'검정',c:'#424242'},
{n:'민트',c:'#26c6da'}

];

let selected=[];

function renderColors(){

const grid=document.getElementById('grid');

grid.innerHTML='';

colors.forEach((item,index)=>{

grid.innerHTML+=`

<button

class="color-btn"

id="c${index}"

style="background:${item.c}"

onclick="toggleColor(${index})">

${item.n}

</button>

`;

});

}

function toggleColor(index){

const idx=selected.indexOf(index);

if(idx>-1){

selected.splice(idx,1);

document.getElementById('c'+index)

.classList.remove('selected');

}

else{

if(selected.length>=people){

alert('인원 수만큼만 선택 가능합니다.');

return;

}

selected.push(index);

document.getElementById('c'+index)

.classList.add('selected');

}

}

function changePeople(num){

people+=num;

if(people<2) people=2;

if(people>12) people=12;

selected=[];

renderColors();

document.getElementById('peopleCount')

.innerText=people;

document.getElementById('result')

.innerHTML='';

}

function shuffle(arr){

for(let i=arr.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1));

[arr[i],arr[j]]=[arr[j],arr[i]];

}

return arr;

}

function drawResult(){

if(selected.length!==people){

alert('인원 수와 동일한 개수의 컬러를 선택해주세요.');

return;

}

let shuffled=shuffle([...selected]);

let html='';

for(let i=0;i<people;i++){

html+=`${colors[shuffled[i]].n} - ${alphabet[i]}<br>`;

}

document.getElementById('result')

.innerHTML=html;

}

renderColors();

</script>

</body>
</html>
